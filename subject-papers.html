<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Subject Papers | COMSATSPrepHub</title>
    <meta name="description" content="Browse past papers organized by year and exam type.">
    <link rel="stylesheet" href="style.css">
    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/dark-mode.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
    
    <style>
      /* Prevent horizontal scroll and ensure stability */
      html, body {
        overflow-x: hidden;
        width: 100%;
        position: relative;
      }
      
      main {
        overflow-x: hidden;
      }

      /* Hide scrollbar for stats row but allow swiping */
      #statsRow::-webkit-scrollbar {
        display: none;
      }
      #statsRow {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      #subjectTitle {
        line-height: 1.2;
        word-break: break-word;
      }
    </style>
</head>

<body class="bg-[#f0f2f5] dark:bg-[#0f172a] text-[#1a1a2e] dark:text-gray-100 transition-colors duration-300 antialiased min-h-screen">
    
    <!-- Navigation (injected by layout.js) -->

    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-6 sm:py-10 page-transition">
        
        <!-- Header Section -->
        <div class="mb-8">
            <!-- Back Button -->
            <a href="subjects.html" 
               class="nav-link-premium inline-flex items-center gap-2 text-sm font-medium text-gray-600 dark:text-gray-400 hover:text-primary dark:hover:text-primary mb-4 transition-colors">
                <span class="material-symbols-outlined text-lg">arrow_back</span>
                <span class="hidden sm:inline">Back to Subjects</span>
                <span class="sm:hidden font-bold">Back</span>
            </a>

            <!-- Subject Header -->
            <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-6">
                <div class="min-w-0 flex-1">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-accent flex items-center justify-center shadow-sm flex-shrink-0">
                            <span class="text-white text-xl font-bold" id="subjectIcon">📘</span>
                        </div>
                        <div class="min-w-0 flex-1 uppercase tracking-tighter">
                            <h1 class="text-2xl sm:text-3xl font-black tracking-tight text-slate-900 dark:text-white truncate" id="subjectTitle">Loading...</h1>
                            <p class="text-[10px] font-bold text-gray-400 dark:text-gray-500 tracking-widest truncate" id="subjectCode"></p>
                        </div>
                    </div>
                </div>

                <!-- Stats Row (Horizontally scrollable on mobile) -->
                <div id="statsRow" class="hidden flex items-center gap-2 overflow-x-auto pb-1 -mx-1 px-1 sm:pb-0 sm:mx-0 sm:px-0">
                    <div class="bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-xl px-3 py-1.5 flex items-center gap-2 shadow-sm flex-shrink-0">
                        <span class="text-base">📄</span>
                        <div>
                            <div class="text-[10px] uppercase font-bold text-gray-400">Papers</div>
                            <div class="font-bold text-sm" id="statPapers">0</div>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-xl px-3 py-1.5 flex items-center gap-2 shadow-sm flex-shrink-0">
                        <span class="text-base">📝</span>
                        <div>
                            <div class="text-[10px] uppercase font-bold text-gray-400">Questions</div>
                            <div class="font-bold text-sm" id="statQuestions">0</div>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-xl px-3 py-1.5 flex items-center gap-2 shadow-sm flex-shrink-0">
                        <span class="text-base">🗓️</span>
                        <div>
                            <div class="text-[10px] uppercase font-bold text-gray-400">Years</div>
                            <div class="font-bold text-sm" id="statYears">—</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error Banner -->
        <div id="errorBanner" class="hidden mb-6 bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/30 text-red-700 dark:text-red-400 px-4 py-3 rounded-2xl flex items-start gap-3">
            <span class="material-symbols-outlined mt-0.5">error</span>
            <div id="errorMessage"></div>
        </div>

        <!-- Loading Skeleton -->
        <div id="loadingSkeleton" class="space-y-6">
            <div class="space-y-3">
                <div class="h-6 w-32 bg-gray-200 dark:bg-white/10 rounded-full animate-pulse"></div>
                <div class="h-20 bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-3xl animate-pulse"></div>
                <div class="h-20 bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-3xl animate-pulse"></div>
            </div>
        </div>

        <!-- Papers Container -->
        <div id="papersContainer" class="hidden space-y-8"></div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-16">
            <div class="w-20 h-20 mx-auto mb-6 rounded-3xl bg-gray-100 dark:bg-white/10 flex items-center justify-center">
                <span class="text-5xl">📂</span>
            </div>
            <h3 class="text-2xl font-bold mb-2 text-slate-800 dark:text-white">No papers found</h3>
            <p class="text-gray-500 dark:text-gray-400 max-w-sm mx-auto">
                No past papers have been uploaded for this subject yet.
            </p>
        </div>

    </main>

    <!-- Footer injected by layout.js -->

    <script type="module">
        import { supabase, escapeHtml as escHtml } from './utils.js';

        const params = new URLSearchParams(window.location.search);
        const subjectName = params.get('subject') || '';
        const subjectCode = params.get('code') || '';

        // Set header info
        document.getElementById('subjectTitle').textContent = subjectName || 'Unknown Subject';
        document.getElementById('subjectCode').textContent = subjectCode ? `Code: ${subjectCode}` : '';
        document.title = `${subjectName} — Papers | COMSATSPrepHub`;

        // Set icon based on subject
        const iconEl = document.getElementById('subjectIcon');
        const subjectIcons = {
            'Data Structures': '💻',
            'Operating Systems': '🖥️',
            'Calculus': '📐',
            'Linear Algebra': '📊',
            'Web Technologies': '🌐'
        };
        iconEl.textContent = subjectIcons[subjectName] || '📘';

        async function loadPapers() {
            try {
                const { data: papers, error } = await supabase
                    .from('past_papers')
                    .select('id, subject_code, subject_name, instructor_name, year, exam_type, semester, total_marks')
                    .eq('subject_name', subjectName)
                    .order('year', { ascending: false });

                if (error) throw error;

                document.getElementById('loadingSkeleton').style.display = 'none';

                if (!papers || papers.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }

                // Get question counts
                const paperIds = papers.map(p => p.id);
                const { data: questions } = await supabase
                    .from('questions')
                    .select('id, paper_id')
                    .in('paper_id', paperIds);

                const qCountMap = {};
                if (questions) {
                    questions.forEach(q => {
                        qCountMap[q.paper_id] = (qCountMap[q.paper_id] || 0) + 1;
                    });
                }

                // Stats
                const totalQuestions = Object.values(qCountMap).reduce((s, c) => s + c, 0);
                const years = [...new Set(papers.map(p => p.year))];
                
                document.getElementById('statPapers').textContent = papers.length;
                document.getElementById('statQuestions').textContent = totalQuestions;
                document.getElementById('statYears').textContent = years.length > 1 
                    ? `${Math.min(...years)}–${Math.max(...years)}` 
                    : years[0];
                document.getElementById('statsRow').style.display = 'flex';

                // Group by year
                const byYear = {};
                papers.forEach(p => {
                    if (!byYear[p.year]) byYear[p.year] = [];
                    byYear[p.year].push(p);
                });

                const sortedYears = Object.keys(byYear).sort((a, b) => b - a);
                const container = document.getElementById('papersContainer');

                container.innerHTML = sortedYears.map(year => {
                    const yearPapers = byYear[year];
                    
                    const cardsHTML = yearPapers.map(p => {
                        const qCount = qCountMap[p.id] || 0;
                        const isMid = p.exam_type.toLowerCase().includes('mid');
                        const instructor = p.instructor_name || 'Instructor name not available';
                        
                        return `
                            <a href="paper-view.html?id=${p.id}" 
                               class="group block w-full bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-3xl p-5 sm:p-6 transition-all duration-300 card-hover active:scale-[0.985]">
                                
                                <div class="flex items-start justify-between mb-4">
                                    <div class="flex items-center gap-3">
                                        <div class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider ${isMid 
                                            ? 'bg-blue-100 text-blue-700 dark:bg-blue-500/20 dark:text-blue-400' 
                                            : 'bg-indigo-100 text-indigo-700 dark:bg-indigo-500/20 dark:text-indigo-400'}">
                                            ${escHtml(p.exam_type)}
                                        </div>
                                    </div>
                                    
                                    <div class="text-right flex-shrink-0">
                                        <div class="text-sm font-black text-slate-900 dark:text-white tabular-nums">${p.year}</div>
                                        <div class="text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest leading-none">${escHtml(p.semester)}</div>
                                    </div>
                                </div>

                                <div class="mb-5">
                                    <h3 class="font-bold text-[17px] sm:text-xl text-slate-900 dark:text-white mb-2 leading-snug break-words uppercase tracking-tight">
                                        ${escHtml(instructor)}
                                    </h3>
                                    <div class="flex items-center gap-2 text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">
                                        <span>${qCount} Questions</span>
                                        <span class="text-slate-200 dark:text-slate-800">•</span>
                                        <span>${p.total_marks} Marks</span>
                                    </div>
                                </div>

                                <div class="flex items-center justify-between pt-3 border-t border-slate-50 dark:border-white/5 mt-auto">
                                    <div class="flex items-center gap-1.5 text-primary-hover group-hover:gap-2.5 transition-all duration-300">
                                        <span class="text-[11px] font-black uppercase tracking-wider">Start Revision</span>
                                        <span class="material-symbols-outlined text-base">arrow_forward</span>
                                    </div>
                                    <div class="text-slate-300 dark:text-slate-700 group-hover:text-primary transition-colors">
                                        <span class="material-symbols-outlined text-lg">local_library</span>
                                    </div>
                                </div>
                            </a>
                        `;
                    }).join('');

                    return `
                        <div class="animate-slide-up">
                            <div class="flex items-center gap-3 mb-3">
                                <div class="px-3 py-1 bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-xl flex items-center gap-2 shadow-sm">
                                    <span class="material-symbols-outlined text-[18px] text-primary">calendar_today</span>
                                    <span class="font-black text-base text-slate-900 dark:text-white tabular-nums">${year}</span>
                                </div>
                                <div class="flex-1 h-px bg-slate-200 dark:bg-white/10"></div>
                                <span class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">${yearPapers.length} papers</span>
                            </div>
                            
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                ${cardsHTML}
                            </div>
                        </div>
                    `;
                }).join('');

                container.style.display = 'block';

                // Re-init Vanilla Tilt for premium effects
                if (window.reinitVanillaTilt) {
                    window.reinitVanillaTilt();
                }

            } catch (err) {
                if (window.handleApiError) {
                    window.handleApiError(err, 'Failed to sync papers');
                }
                document.getElementById('loadingSkeleton').style.display = 'none';
                const banner = document.getElementById('errorBanner');
                if (banner) {
                    banner.style.display = 'block';
                    document.getElementById('errorMessage').innerHTML = `
                        <strong>Failed to load papers</strong><br>
                        <span class="text-sm">${err.message}</span>
                    `;
                }
            }
        }

        loadPapers();
    </script>

    <script type="module" src="js/layout.js"></script>
</body>
</html>
