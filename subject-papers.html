<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Subject Papers | COMSATSPrepHub</title>
    <meta name="description" content="Browse past papers organized by year and exam type.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <!-- Use built CSS instead -->
    <link rel="stylesheet" href="styles/tailwind-built.css">
    <link rel="stylesheet" href="style.css">

    <script src="js/dark-mode.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
    
    <style>
      /* Prevent horizontal scroll and ensure stability */
      html, body {
        overflow-x: hidden;
        width: 100%;
        position: relative;
      }
      
      main {
        overflow-x: hidden;
      }

      /* Hide scrollbar for stats row but allow swiping */
      #statsRow::-webkit-scrollbar {
        display: none;
      }
      #statsRow {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      #subjectTitle {
        line-height: 1.2;
        word-break: break-word;
      }
    </style>
</head>

<body class="bg-[#f0f2f5] dark:bg-[#0f172a] text-[#1a1a2e] dark:text-gray-100 transition-colors duration-300 antialiased min-h-screen">
    
    <div id="app-header"></div>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-6 sm:py-10 page-transition">
        
        <!-- Header Section -->
        <div class="mb-8">
            <!-- Back Button -->
            <a href="subjects.html" 
               class="nav-link-premium inline-flex items-center gap-2 text-sm font-medium text-gray-600 dark:text-gray-400 hover:text-primary dark:hover:text-primary mb-4 transition-colors">
                <span class="material-symbols-outlined text-lg">arrow_back</span>
                <span class="hidden sm:inline">Back to Subjects</span>
                <span class="sm:hidden font-bold">Back</span>
            </a>

            <!-- Subject Header -->
            <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-6">
                <div class="min-w-0 flex-1">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-accent flex items-center justify-center shadow-sm flex-shrink-0">
                            <span class="text-white text-xl font-bold" id="subjectIcon">📘</span>
                        </div>
                        <div class="min-w-0 flex-1 uppercase tracking-tighter">
                            <h1 class="text-2xl sm:text-3xl font-black tracking-tight text-slate-900 dark:text-white truncate" id="subjectTitle">Loading...</h1>
                            <p class="text-[10px] font-bold text-gray-400 dark:text-gray-500 tracking-widest truncate" id="subjectCode"></p>
                        </div>
                    </div>
                </div>

                <!-- Stats Row (Horizontally scrollable on mobile) -->
                <div id="statsRow" class="flex items-center gap-2 overflow-x-auto pb-1 -mx-1 px-1 sm:pb-0 sm:mx-0 sm:px-0 min-h-[58px] opacity-60" aria-live="polite">
                    <div class="bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-xl px-3 py-1.5 flex items-center gap-2 shadow-sm flex-shrink-0">
                        <span class="text-base">📄</span>
                        <div>
                            <div class="text-[10px] uppercase font-bold text-gray-400">Papers</div>
                            <div class="font-bold text-sm" id="statPapers">0</div>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-xl px-3 py-1.5 flex items-center gap-2 shadow-sm flex-shrink-0">
                        <span class="text-base">📝</span>
                        <div>
                            <div class="text-[10px] uppercase font-bold text-gray-400">Questions</div>
                            <div class="font-bold text-sm" id="statQuestions">0</div>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-xl px-3 py-1.5 flex items-center gap-2 shadow-sm flex-shrink-0">
                        <span class="text-base">🗓️</span>
                        <div>
                            <div class="text-[10px] uppercase font-bold text-gray-400">Years</div>
                            <div class="font-bold text-sm" id="statYears">—</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error Banner -->
        <div id="errorBanner" class="hidden mb-6 bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/30 text-red-700 dark:text-red-400 px-4 py-3 rounded-2xl flex items-start gap-3">
            <span class="material-symbols-outlined mt-0.5">error</span>
            <div id="errorMessage"></div>
        </div>

        <!-- Loading Skeleton -->
        <div id="loadingSkeleton" class="space-y-6">
            <div class="space-y-3">
                <div class="h-6 w-32 bg-gray-200 dark:bg-white/10 rounded-full animate-pulse"></div>
                <div class="h-20 bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-3xl animate-pulse"></div>
                <div class="h-20 bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-3xl animate-pulse"></div>
            </div>
        </div>

        <!-- Papers Container -->
        <div id="papersContainer" class="hidden space-y-8"></div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-16">
            <div class="w-20 h-20 mx-auto mb-6 rounded-3xl bg-gray-100 dark:bg-white/10 flex items-center justify-center">
                <span class="text-5xl">📂</span>
            </div>
            <h3 class="text-2xl font-bold mb-2 text-slate-800 dark:text-white">No papers found</h3>
            <p class="text-gray-500 dark:text-gray-400 max-w-sm mx-auto">
                No past papers have been uploaded for this subject yet.
            </p>
        </div>

    </main>

    <div id="app-footer"></div>
    <div id="app-mobile-nav"></div>

    <script type="module">
        import { supabase, auth, escapeHtml as escHtml } from './utils.js';

        const params = new URLSearchParams(window.location.search);
        const subjectName = params.get('subject') || '';
        const subjectCode = params.get('code') || '';

        // Set header info
        document.getElementById('subjectTitle').textContent = subjectName || 'Unknown Subject';
        document.getElementById('subjectCode').textContent = subjectCode ? `Code: ${subjectCode}` : '';
        document.title = `${subjectName} — Papers | COMSATSPrepHub`;

        // Set icon based on subject
        const iconEl = document.getElementById('subjectIcon');
        const subjectIcons = {
            'Data Structures': '💻',
            'Operating Systems': '🖥️',
            'Calculus': '📐',
            'Linear Algebra': '📊',
            'Web Technologies': '🌐'
        };
        iconEl.textContent = subjectIcons[subjectName] || '📘';

        async function loadPapers() {
            const loadingEl = document.getElementById('loadingSkeleton');
            const papersContainer = document.getElementById('papersContainer');
            const emptyState = document.getElementById('emptyState');
            const errorBanner = document.getElementById('errorBanner');
            const errorMessage = document.getElementById('errorMessage');

            console.log('%c[Subjects-Papers] 🚀 loadPapers started', 'color: #10b981; font-weight: bold');
            console.log('Subject:', subjectName, ' | Code:', subjectCode);

            try {
                // Timeout protection (same as subjects.html)
                const timeoutPromise = new Promise((_, reject) =>
                    setTimeout(() => reject(new Error('Request timed out after 10 seconds')), 10000)
                );

                // Use .select('*') so it never breaks again after model changes
                let query = supabase
                    .from('past_papers')
                    .select('*')
                    .order('year', { ascending: false });

                if (subjectCode) {
                    query = query.eq('subject_code', subjectCode);
                } else if (subjectName) {
                    query = query.eq('subject_name', subjectName);
                }

                const fetchPromise = query;
                const { data: papers, error } = await Promise.race([fetchPromise, timeoutPromise]);

                console.log('✅ Query result:', { papersFound: papers?.length || 0, error });

                if (error) throw error;

                // Hide loading
                loadingEl.style.display = 'none';

                if (!papers || papers.length === 0) {
                    emptyState.style.display = 'block';
                    console.log('No papers found for this subject');
                    return;
                }

                console.log('📋 Sample paper object (check column names):', papers[0]);

                // === STATS ===
                const years = [...new Set(papers.map(p => p.year).filter(Boolean))];
                document.getElementById('statPapers').textContent = papers.length;
                document.getElementById('statYears').textContent = years.length > 1 
                    ? `${Math.min(...years)}–${Math.max(...years)}` 
                    : (years[0] || '—');
                document.getElementById('statsRow').classList.remove('opacity-60');

                // === GROUP BY YEAR + RENDER CARDS ===
                const byYear = {};
                papers.forEach(p => {
                    const year = p.year || 'Unknown';
                    if (!byYear[year]) byYear[year] = [];
                    byYear[year].push(p);
                });

                const sortedYears = Object.keys(byYear).sort((a, b) => b - a);

                let html = '';
                sortedYears.forEach(year => {
                    const yearPapers = byYear[year];

                    const cardsHTML = yearPapers.map(p => {
                        // Use fallbacks so it works even if column names changed
                        const examType = p.exam_type || p.type || p.exam || 'Exam';
                        const semester = p.semester || '';
                        const instructor = p.instructor_name || p.instructor || p.teacher || 'Instructor not available';
                        const totalMarks = p.total_marks || p.marks || p.total || '?';
                        const qCount = 0; // we'll improve this later once we know the questions table structure

                        const isMid = String(examType).toLowerCase().includes('mid');

                        return `
                            <a href="paper-view.html?id=${p.id}" 
                               class="group block w-full bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-3xl p-5 sm:p-6 transition-all duration-300 card-hover active:scale-[0.985]">
                                
                                <div class="flex items-start justify-between mb-4">
                                    <div class="flex items-center gap-3">
                                        <div class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider ${isMid 
                                            ? 'bg-blue-100 text-blue-700 dark:bg-blue-500/20 dark:text-blue-400' 
                                            : 'bg-indigo-100 text-indigo-700 dark:bg-indigo-500/20 dark:text-indigo-400'}">
                                            ${escHtml(examType)}
                                        </div>
                                    </div>
                                    
                                    <div class="text-right flex-shrink-0">
                                        <div class="text-sm font-black text-slate-900 dark:text-white tabular-nums">${year}</div>
                                        <div class="text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest leading-none">${escHtml(semester)}</div>
                                    </div>
                                </div>

                                <div class="mb-5">
                                    <h3 class="font-bold text-[17px] sm:text-xl text-slate-900 dark:text-white mb-2 leading-snug break-words">
                                        ${escHtml(instructor)}
                                    </h3>
                                    <div class="flex items-center gap-2 text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">
                                        <span>${qCount} Questions</span>
                                        <span class="text-slate-200 dark:text-slate-800">•</span>
                                        <span>${totalMarks} Marks</span>
                                    </div>
                                </div>

                                <div class="flex items-center justify-between pt-3 border-t border-slate-50 dark:border-white/5">
                                    <div class="flex items-center gap-1.5 text-primary-hover group-hover:gap-2.5 transition-all duration-300">
                                        <span class="text-[11px] font-black uppercase tracking-wider">Start Revision</span>
                                        <span class="material-symbols-outlined text-base">arrow_forward</span>
                                    </div>
                                    <div class="text-slate-300 dark:text-slate-700 group-hover:text-primary transition-colors">
                                        <span class="material-symbols-outlined text-lg">local_library</span>
                                    </div>
                                </div>
                            </a>
                        `;
                    }).join('');

                    html += `
                        <div class="animate-slide-up mb-10">
                            <div class="flex items-center gap-3 mb-3">
                                <div class="px-3 py-1 bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-xl flex items-center gap-2 shadow-sm">
                                    <span class="material-symbols-outlined text-[18px] text-primary">calendar_today</span>
                                    <span class="font-black text-base text-slate-900 dark:text-white tabular-nums">${year}</span>
                                </div>
                                <div class="flex-1 h-px bg-slate-200 dark:bg-white/10"></div>
                                <span class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">${yearPapers.length} papers</span>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                ${cardsHTML}
                            </div>
                        </div>
                    `;
                });

                papersContainer.innerHTML = html;
                papersContainer.style.display = 'block';
                papersContainer.classList.remove('hidden');

                console.log('%c✅ Papers loaded successfully!', 'color: #10b981; font-weight: bold');

                // TRACK PROGRESS: Accessing a subject
                saveSubjectAccess(subjectCode, subjectName);

            } catch (err) {
                console.error('❌ loadPapers failed:', err);
                loadingEl.style.display = 'none';

                if (errorBanner && errorMessage) {
                    errorBanner.style.display = 'flex';
                    errorMessage.innerHTML = `
                        <strong>Failed to load papers</strong><br>
                        <span class="text-sm">${err.message || err}</span>
                    `;
                } else {
                    alert('Error: ' + (err.message || err));
                }
            }
        }

        // Start loading
        loadPapers();

        async function saveSubjectAccess(code, name) {
            const session = await auth.getSession();
            const userId = session?.user?.id;
            if (!userId || !code) return;

            try {
                // Check if already exists
                const { data: existing } = await supabase
                    .from('user_subject_progress')
                    .select('id, sessions_count')
                    .eq('user_id', userId)
                    .eq('subject_code', code)
                    .maybeSingle();

                if (existing) {
                    await supabase
                        .from('user_subject_progress')
                        .update({ 
                            sessions_count: (existing.sessions_count || 0) + 1,
                            updated_at: new Date().toISOString()
                        })
                        .eq('id', existing.id);
                } else {
                    await supabase
                        .from('user_subject_progress')
                        .insert({
                            user_id: userId,
                            subject_code: code,
                            subject_name: name,
                            sessions_count: 1,
                            mastery_percent: 5 // initial boost for starting
                        });
                }
            } catch (err) {
                console.warn('Silent progress tracking failed:', err);
            }
        }
    </script>

    <script type="module" src="js/layout.js"></script>
</body>
</html>
